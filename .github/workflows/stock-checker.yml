name: ⚡ Super Fast Stock Checker

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *' # 5 dakikada bir çalışması için bu şart

jobs:
  super-fast-stock-check:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write  # Git push yapabilmek için ZORUNLU

    steps:
    - name: ⚡ Checkout (sparse)
      uses: actions/checkout@v4
      with:
        sparse-checkout: |
          main_github.py
          scraperHelpers.py
          config.json
          requirements.txt
        sparse-checkout-cone-mode: false
      
    - name: ⚡ Python + Cache
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        cache: 'pip'
        cache-dependency-path: 'requirements.txt'
        
    - name: ⚡ Install Dependencies (cached)
      timeout-minutes: 2 # Burayı 2 dakika ile sınırla, takılırsa hemen geçsin
      run: |
        pip install -r requirements.txt
        
    - name: ⚡ Fast Stock Check
      run: |
        echo "⚡ Super Fast Check - $(date '+%H:%M:%S')"
        python main_github.py
      env:
        BOT_API: ${{ secrets.BOT_API }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
